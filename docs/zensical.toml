# ── Scalar project settings ──────────────────────────────────────────────────
[project]
site_name        = "Sentinel AI Agent Framework"
site_description = "A flexible and extensible framework for building AI agents with tool calling capabilities"
site_author      = "PhonePe"
site_url         = "https://phonepe.github.io/sentinel-ai"
repo_name        = "PhonePe/sentinel-ai"
repo_url         = "https://github.com/PhonePe/sentinel-ai"
edit_uri         = "edit/master/docs/docs/"
copyright        = "Copyright &copy; 2025  PhonePe Private Limited"
extra_css        = ["stylesheets/extra.css"]

nav = [
  {"Home" = "index.md"},
  {"Agents" = "agents.md"},
  {"Tools" = "tools.md"},
  {"Messages & Session" = "messages-session.md"},
  {"Using MCP Servers" = "using-mcp-servers.md"},
  {"Calling Remote Services" = "calling-remote-services.md"},
  {"Agent Skills Extension" = "agent-skills-extension.md"},
  {"Agent Registry" = "agent-registry.md"},
  {"Agent Memory" = "agent-memory.md"},
  {"Observability" = "observability.md"},
  {"Errors" = "errors.md"}
]

# ── Theme ────────────────────────────────────────────────────────────────────
[project.theme]
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.share",
  "search.suggest",
  "toc.follow"
]

[project.theme.font]
text = "Roboto"
code = "Roboto Mono"

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media   = "(prefers-color-scheme)"
primary = "indigo"
accent  = "cyan"

[project.theme.palette.toggle]
icon = "material/brightness-auto"
name = "Switch to light mode"

[[project.theme.palette]]
media   = "(prefers-color-scheme: light)"
scheme  = "default"
primary = "indigo"
accent  = "cyan"

[project.theme.palette.toggle]
icon = "material/brightness-7"
name = "Switch to dark mode"

[[project.theme.palette]]
media   = "(prefers-color-scheme: dark)"
scheme  = "slate"
primary = "indigo"
accent  = "cyan"

[project.theme.palette.toggle]
icon = "material/brightness-4"
name = "Switch to system preference"

# ── Extra ────────────────────────────────────────────────────────────────────
[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/PhonePe/sentinel-ai"

# ── Markdown extensions ──────────────────────────────────────────────────────
[project.markdown_extensions.abbr]

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.def_list]

[project.markdown_extensions.footnotes]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions."pymdownx.arithmatex"]
generic = true

[project.markdown_extensions."pymdownx.betterem"]
smart_enable = "all"

[project.markdown_extensions."pymdownx.caret"]

[project.markdown_extensions."pymdownx.details"]

[project.markdown_extensions."pymdownx.emoji"]
emoji_index     = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions."pymdownx.highlight"]
anchor_linenums    = true
line_spans         = "__span"
pygments_lang_class = true

[project.markdown_extensions."pymdownx.inlinehilite"]

[project.markdown_extensions."pymdownx.keys"]

[project.markdown_extensions."pymdownx.mark"]

[project.markdown_extensions."pymdownx.smartsymbols"]

[project.markdown_extensions."pymdownx.snippets"]

[project.markdown_extensions."pymdownx.superfences"]

[[project.markdown_extensions."pymdownx.superfences".custom_fences]]
name   = "mermaid"
class  = "mermaid"
format = "pymdownx.superfences.fence_code_format"

[project.markdown_extensions."pymdownx.tabbed"]
alternate_style = true

[project.markdown_extensions."pymdownx.tasklist"]
custom_checkbox = true

[project.markdown_extensions."pymdownx.tilde"]
